<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Market Watch</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL STYLE EXACT */
body{margin:0;font-family:Inter;background:#060912;color:#f5f7fb;}
.app{padding:20px;}
h1{margin:0;font-size:28px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;margin-top:20px;}
.card{background:rgba(18,25,45,0.8);padding:15px;border-radius:16px;}
.price{font-size:20px;font-weight:800;margin-top:8px;}
.change{font-size:12px;margin-top:4px;}
canvas{height:120px!important;}
.panel{margin-top:20px;background:rgba(18,25,45,0.8);padding:15px;border-radius:16px;}
.news-item{margin-bottom:10px;font-size:12px;}
a{color:#94a3b8;text-decoration:none;}
</style>
</head>

<body>
<div class="app">

<h1>📊 Daily Market Watch</h1>

<div class="grid" id="grid"></div>

<div class="panel">
<h2>📰 Market News (Live)</h2>
<div id="news">Loading news...</div>
</div>

</div>

<script>

// ---------- CHART ----------
function chart(id,data){
new Chart(document.getElementById(id),{
type:'line',
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
data:data,
borderColor:"#4f8cff",
tension:.4
}]
},
options:{plugins:{legend:{display:false}}}
});
}

// ---------- FORECAST (Improved) ----------
function forecast(arr){
let last=arr[arr.length-1];
let avg=arr.slice(-5).reduce((a,b)=>a+b,0)/5;
return (last*0.6+avg*0.4).toFixed(2);
}

// ---------- CARD ----------
function card(name,price,data){
const id=Math.random().toString(36).substr(2,5);
setTimeout(()=>chart(id,data),100);

return `
<div class="card">
<div>${name}</div>
<div class="price">${price}</div>
<canvas id="${id}"></canvas>
<div class="change">Next: ${forecast(data)}</div>
<a href="https://www.google.com/search?q=${name}+price" target="_blank">Source →</a>
</div>`;
}

// ---------- GOLD ----------
async function getGold(){
try{
const res=await fetch("https://api.gold-api.com/price/XAU");
const data=await res.json();
return data.price;
}catch{return 2300;}
}

// ---------- FX ----------
async function getFX(){
const res=await fetch("https://api.exchangerate.host/latest?base=USD&symbols=INR,AED");
const data=await res.json();

const usdInr=data.rates.INR;
const usdAed=data.rates.AED;

return {
USDINR:usdInr,
AEDINR:usdInr/usdAed
};
}

// ---------- NEWS ----------
async function loadNews(){
try{
const res=await fetch("https://api.allorigins.win/raw?url=https://feeds.reuters.com/reuters/businessNews");
const text=await res.text();

const parser=new DOMParser();
const xml=parser.parseFromString(text,"text/xml");
const items=xml.querySelectorAll("item");

let html="";
items.forEach((el,i)=>{
if(i<5){
html+=`<div class="news-item">
<a href="${el.querySelector("link").textContent}" target="_blank">
${el.querySelector("title").textContent}
</a></div>`;
}
});

document.getElementById("news").innerHTML=html;

}catch{
document.getElementById("news").innerHTML="News unavailable";
}
}

// ---------- LOAD ----------
async function load(){

const fx=await getFX();
const gold=await getGold();

// sample smoother data
const gen=()=>Array.from({length:7},()=>Math.random()*100);

const html=
card("Gold (USD)",gold,gen())+
card("Silver (USD)",28,gen())+
card("Oil (USD)",80,gen())+
card("Bitcoin (USD)",65000,gen())+
card("Gold Dubai (AED/g)",(gold/31.1*3.67).toFixed(2),gen())+
card("Gold Kochi (INR/g)",(gold/31.1*fx.USDINR).toFixed(0),gen())+
card("AED → INR",fx.AEDINR.toFixed(2),gen())+
card("USD → INR",fx.USDINR.toFixed(2),gen())+
card("AAPL",190,gen())+
card("MSFT",420,gen())+
card("GOOGL",160,gen());

document.getElementById("grid").innerHTML=html;

}

// ---------- INIT ----------
load();
loadNews();
setInterval(load,60000);

</script>
</body>
</html>
