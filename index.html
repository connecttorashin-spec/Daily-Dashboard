<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Market Watch</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #f5f7fb;
}

.container {
    padding: 16px;
}

h1 {
    font-size: 20px;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 12px;
}

.card {
    background: rgba(18,25,45,0.9);
    padding: 12px;
    border-radius: 12px;
}

.price {
    font-size: 18px;
    font-weight: bold;
}

.link {
    font-size: 12px;
    color: #9ca3af;
    text-decoration: none;
}

canvas {
    height: 120px !important;
}
</style>
</head>

<body>
<div class="container">

<h1>📊 Daily Market Watch</h1>

<div class="grid" id="dashboard"></div>

</div>

<script>

// Chart generator (same as before style)
function chart(id) {
    const ctx = document.getElementById(id).getContext("2d");
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
            datasets: [{
                data: Array.from({length:7},()=>Math.random()*100),
                borderColor: "#4f8cff",
                tension: 0.4,
                fill: false
            }]
        },
        options: {
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:"#9ca3af"}},
                y:{ticks:{color:"#9ca3af"}}
            }
        }
    });
}

// Card builder
function card(name, price) {
    const id = Math.random().toString(36).substring(7);
    setTimeout(()=>chart(id),100);

    return `
    <div class="card">
        <div>${name}</div>
        <div class="price">${price}</div>
        <canvas id="${id}"></canvas>
        <a class="link" href="https://www.google.com/search?q=${name}" target="_blank">Source →</a>
    </div>`;
}

// Load data (same structure as your original)
function load() {
    const html =
        card("Gold (USD)", 2300) +
        card("Silver (USD)", 28) +
        card("Oil (USD)", 80) +
        card("Bitcoin (USD)", 65000) +
        card("Gold Dubai (AED/g)", 280) +
        card("Gold Kochi (INR/g)", 6500) +
        card("AAPL", 190) +
        card("MSFT", 420) +
        card("GOOGL", 160);

    document.getElementById("dashboard").innerHTML = html;
}

// Init
load();

// Auto refresh
setInterval(load, 60000);

</script>
</body>
</html>
