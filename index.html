<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Watch</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      color: #f5f7fb;
      background: #060912;
    }

    .app { padding: 20px; }

    h1 { margin: 0; font-size: 28px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(18,25,45,0.8);
      padding: 15px;
      border-radius: 16px;
    }

    .price {
      font-size: 20px;
      font-weight: 800;
      margin-top: 8px;
    }

    canvas {
      height: 120px !important;
    }
  </style>
</head>

<body>
<div class="app">

<h1>📊 Daily Market Watch</h1>

<div class="grid" id="grid"></div>

</div>

<script>

function chart(id){
  new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
      datasets:[{
        data:Array.from({length:7},()=>Math.random()*100),
        borderColor:"#4f8cff",
        tension:.4
      }]
    },
    options:{plugins:{legend:{display:false}}}
  });
}

function card(name,price){
  const id=Math.random().toString(36).substr(2,5);
  setTimeout(()=>chart(id),100);

  return `
  <div class="card">
    <div>${name}</div>
    <div class="price">${price}</div>
    <canvas id="${id}"></canvas>
  </div>`;
}

function load(){
  const html =
    card("Gold (USD)",2300)+
    card("Silver (USD)",28)+
    card("Oil (USD)",80)+
    card("Bitcoin (USD)",65000)+
    card("Gold Dubai (AED/g)",280)+
    card("Gold Kochi (INR/g)",6500)+
    card("AED → INR",22.7)+
    card("AAPL",190)+
    card("MSFT",420)+
    card("GOOGL",160);

  document.getElementById("grid").innerHTML = html;
}

load();
setInterval(load,60000);

</script>
</body>
</html>
